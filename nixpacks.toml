[phases.setup]
nixPkgs = ["libgomp", "stdenv.cc.cc.lib"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = [
  "python manage.py migrate --settings=core.settings",
  "python manage.py collectstatic --noinput --settings=core.settings"
]

[start]
cmd = "python startup.py && gunicorn wsgi:application --bind 0.0.0.0:$PORT --workers 2"