<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ReVive — Readmission Risk</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;color:#fff;}
input[type=range]{width:100%;accent-color:#7c3aed;cursor:pointer;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
{% verbatim %}
const API = window.location.origin + "/api";
const RISK_CONFIG = {
  High:   { color:"#E24B4A", emoji:"🔴" },
  Medium: { color:"#EF9F27", emoji:"🟡" },
  Low:    { color:"#1D9E75", emoji:"🟢" },
};
const FIELDS = [
  { key:"age_numeric",        label:"Age",                   min:0,  max:100, def:65 },
  { key:"time_in_hospital",   label:"Length of Stay (days)", min:1,  max:30,  def:5  },
  { key:"number_inpatient",   label:"Prior Inpatient Visits",min:0,  max:10,  def:2  },
  { key:"number_diagnoses",   label:"Diagnoses Count",       min:1,  max:20,  def:7  },
  { key:"num_medications",    label:"Medications",           min:0,  max:40,  def:12 },
  { key:"num_lab_procedures", label:"Lab Tests",             min:0,  max:100, def:40 },
  { key:"num_procedures",     label:"Procedures",            min:0,  max:10,  def:2  },
  { key:"number_emergency",   label:"Prior Emergency Visits",min:0,  max:10,  def:1  },
];
const CHECKS = [
  { key:"cardiac_primary",     label:"Cardiac primary diagnosis" },
  { key:"diabetes_primary",    label:"Diabetes primary diagnosis"},
  { key:"high_risk_discharge", label:"High-risk discharge"       },
  { key:"medication_changed",  label:"Medication changed"        },
];

function App() {
  const [form,    setForm]    = React.useState(Object.fromEntries(FIELDS.map(f=>[f.key,f.def])));
  const [checks,  setChecks]  = React.useState(Object.fromEntries(CHECKS.map(c=>[c.key,0])));
  const [result,  setResult]  = React.useState(null);
  const [loading, setLoading] = React.useState(false);
  const [error,   setError]   = React.useState("");

  const buildPayload = () => ({
    ...form, ...checks,
    total_prior_visits:    form.number_inpatient + form.number_emergency,
    is_elderly:            form.age_numeric >= 65 ? 1 : 0,
    polypharmacy:          form.num_medications >= 5 ? 1 : 0,
    complexity_score:      +(form.number_diagnoses + form.num_medications*0.5 + form.num_lab_procedures*0.2).toFixed(2),
    los_x_diagnoses:       form.time_in_hospital * form.number_diagnoses,
    meds_x_los:            form.num_medications * form.time_in_hospital,
    elderly_x_complex:     (form.age_numeric>=65?1:0) * (form.number_diagnoses + form.num_medications*0.5),
    inpatient_x_emergency: form.number_inpatient * form.number_emergency,
    high_diagnosis_burden: form.number_diagnoses >= 5 ? 1 : 0,
    high_lab_use:          form.num_lab_procedures > 40 ? 1 : 0,
    had_procedures:        form.num_procedures > 0 ? 1 : 0,
    has_inpatient_history: form.number_inpatient >= 1 ? 1 : 0,
    emergency_prone:       form.number_emergency >= 2 ? 1 : 0,
    high_utiliser:         (form.number_inpatient + form.number_emergency) >= 3 ? 1 : 0,
  });

  const predict = async () => {
    setLoading(true); setError(""); setResult(null);
    try {
      const r = await fetch(`${API}/predict/`, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ patient_data: buildPayload() }),
      });
      const data = await r.json();
      setResult(data);
    } catch(e) {
      setError("Cannot reach API: " + e.message);
    }
    setLoading(false);
  };

  const rc = result ? RISK_CONFIG[result.risk_level] : null;

  return (
    <div style={{minHeight:"100vh",padding:24}}>
      <div style={{maxWidth:800,margin:"0 auto"}}>

        {/* Header */}
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:48}}>🏥</div>
          <h1 style={{fontSize:32,fontWeight:800,background:"linear-gradient(90deg,#a78bfa,#38bdf8)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>ReVive</h1>
          <p style={{color:"#94a3b8",fontSize:14}}>Hospital Readmission Prediction System</p>
        </div>

        {/* Sliders */}
        <div style={{background:"rgba(255,255,255,0.05)",borderRadius:16,padding:24,marginBottom:20}}>
          <h2 style={{fontSize:16,fontWeight:700,marginBottom:16,color:"#a78bfa"}}>Patient Parameters</h2>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
            {FIELDS.map(f => (
              <div key={f.key}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:6}}>
                  <span style={{color:"#94a3b8"}}>{f.label}</span>
                  <span style={{fontWeight:700,color:"#a78bfa"}}>{form[f.key]}</span>
                </div>
                <input type="range" min={f.min} max={f.max} value={form[f.key]}
                  onChange={e => setForm(p=>({...p,[f.key]:+e.target.value}))}/>
              </div>
            ))}
          </div>
        </div>

        {/* Checkboxes */}
        <div style={{background:"rgba(255,255,255,0.05)",borderRadius:16,padding:24,marginBottom:20}}>
          <h2 style={{fontSize:16,fontWeight:700,marginBottom:16,color:"#a78bfa"}}>Clinical Flags</h2>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            {CHECKS.map(c => (
              <label key={c.key} style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",fontSize:14}}>
                <input type="checkbox" checked={checks[c.key]===1}
                  onChange={e => setChecks(p=>({...p,[c.key]:e.target.checked?1:0}))}
                  style={{width:18,height:18,accentColor:"#7c3aed"}}/>
                <span style={{color:"#cbd5e1"}}>{c.label}</span>
              </label>
            ))}
          </div>
        </div>

        {/* Button */}
        <button onClick={predict} disabled={loading}
          style={{width:"100%",padding:"14px",borderRadius:12,border:"none",cursor:"pointer",
            background:"linear-gradient(135deg,#7c3aed,#2563eb)",color:"#fff",fontSize:16,fontWeight:700,marginBottom:20}}>
          {loading ? "⏳ Analyzing..." : "🔍 Predict Readmission Risk"}
        </button>

        {/* Error */}
        {error && <div style={{background:"#FCEBEB",color:"#A32D2D",padding:16,borderRadius:12,marginBottom:20,fontWeight:600}}>⚠️ {error}</div>}

        {/* Result */}
        {result && rc && (
          <div style={{background:"rgba(255,255,255,0.05)",borderRadius:16,padding:24,textAlign:"center"}}>
            <div style={{fontSize:48,marginBottom:8}}>{rc.emoji}</div>
            <div style={{fontSize:48,fontWeight:800,color:rc.color}}>{result.readmission_percentage}%</div>
            <div style={{fontSize:22,fontWeight:700,color:rc.color,marginBottom:8}}>{result.risk_level} Risk</div>
            <div style={{color:"#94a3b8",fontSize:14}}>{result.message}</div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
{% endverbatim %}
</script>
</body>
</html>
