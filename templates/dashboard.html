<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ReVive — Readmission Risk</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: linear-gradient(135deg,#0f0c29,#302b63,#24243e); min-height: 100vh; color: #fff; }
input[type=range] { width: 100%; accent-color: #7c3aed; cursor: pointer; }
::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #7c3aed; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const API = "http://127.0.0.1:8000/api";
const RISK_CONFIG = {
  High:   { color:"#E24B4A", bg:"linear-gradient(135deg,#E24B4A,#A32D2D)", emoji:"🔴" },
  Medium: { color:"#EF9F27", bg:"linear-gradient(135deg,#EF9F27,#BA7517)", emoji:"🟡" },
  Low:    { color:"#1D9E75", bg:"linear-gradient(135deg,#1D9E75,#0F6E56)", emoji:"🟢" },
};
const FIELDS = [
  { key:"age_numeric",        label:"Age",                    min:0,  max:100, def:65 },
  { key:"time_in_hospital",   label:"Length of Stay (days)",  min:1,  max:30,  def:5  },
  { key:"number_inpatient",   label:"Prior Inpatient Visits", min:0,  max:10,  def:2  },
  { key:"number_diagnoses",   label:"Diagnoses Count",        min:1,  max:20,  def:7  },
  { key:"num_medications",    label:"Medications",            min:0,  max:40,  def:12 },
  { key:"num_lab_procedures", label:"Lab Tests",              min:0,  max:100, def:40 },
  { key:"num_procedures",     label:"Procedures",             min:0,  max:10,  def:2  },
  { key:"number_emergency",   label:"Prior Emergency Visits", min:0,  max:10,  def:1  },
];
const CHECKS = [
  { key:"cardiac_primary",    label:"Cardiac primary diagnosis"  },
  { key:"diabetes_primary",   label:"Diabetes primary diagnosis" },
  { key:"high_risk_discharge",label:"High-risk discharge"        },
  { key:"medication_changed", label:"Medication changed"         },
];

function GaugeChart({ value }) {
  const pct = Math.min(100, Math.max(0, value * 100));
  const toRad = d => (d * Math.PI) / 180;
  const r = 70, cx = 90, cy = 90;
  const arc = (a1, a2, col) => {
    const s = { x: cx + r * Math.cos(toRad(a1)), y: cy + r * Math.sin(toRad(a1)) };
    const e = { x: cx + r * Math.cos(toRad(a2)), y: cy + r * Math.sin(toRad(a2)) };
    return <path d={`M${s.x},${s.y} A${r},${r} 0 ${a2-a1>180?1:0} 1 ${e.x},${e.y}`} fill="none" stroke={col} strokeWidth="14" strokeLinecap="round"/>;
  };
  const angle = -135 + (pct / 100) * 270;
  const nx = cx + (r-18) * Math.cos(toRad(angle));
  const ny = cy + (r-18) * Math.sin(toRad(angle));
  const col = pct >= 60 ? "#E24B4A" : pct >= 30 ? "#EF9F27" : "#1D9E75";
  return (
    <svg viewBox="0 0 180 120" style={{width:"100%",maxWidth:200}}>
      {arc(-135,-45,"#E1F5EE")}{arc(-45,45,"#FAEEDA")}{arc(45,135,"#FCEBEB")}
      {arc(-135, -135+(pct/100)*270, col)}
      <circle cx={nx} cy={ny} r="7" fill={col}/>
      <circle cx={cx} cy={cy} r="5" fill="#888"/>
      <text x={cx} y={cy+22} textAnchor="middle" fontSize="18" fontWeight="700" fill={col}>{Math.round(pct)}%</text>
      <text x={cx} y={cy+35} textAnchor="middle" fontSize="9" fill="#aaa">READMISSION RISK</text>
    </svg>
  );
}

function BarChart({ data }) {
  const max = Math.max(...data.map(d=>d.v), 1);
  const colors = ["#7c3aed","#1D9E75","#EF9F27","#E24B4A","#D4537E"];
  return (
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {data.map((d,i) => (
        <div key={d.k} style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:130,fontSize:12,color:"#94a3b8",textAlign:"right",flexShrink:0}}>{d.k}</div>
          <div style={{flex:1,background:"rgba(255,255,255,0.1)",borderRadius:6,height:20,overflow:"hidden"}}>
            <div style={{width:`${(d.v/max)*100}%`,background:colors[i%colors.length],height:"100%",borderRadius:6,minWidth:4,transition:"width 0.6s ease"}}/>
          </div>
          <div style={{width:32,fontSize:12,fontWeight:700,color:colors[i%colors.length]}}>{d.v}</div>
        </div>
      ))}
    </div>
  );
}

function App() {
  const [form,    setForm]    = React.useState(Object.fromEntries(FIELDS.map(f=>[f.key,f.def])));
  const [checks,  setChecks]  = React.useState(Object.fromEntries(CHECKS.map(c=>[c.key,0])));
  const [result,  setResult]  = React.useState(null);
  const [loading, setLoading] = React.useState(false);
  const [history, setHistory] = React.useState([]);
  const [error,   setError]   = React.useState("");
  const [tab,     setTab]     = React.useState("predict");

  const buildPayload = () => ({
    ...form, ...checks,
    total_prior_visits:    form.number_inpatient + form.number_emergency,
    is_elderly:            form.age_numeric >= 65 ? 1 : 0,
    polypharmacy:          form.num_medications >= 5 ? 1 : 0,
    complexity_score:      +(form.number_diagnoses + form.num_medications*0.5 + form.num_lab_procedures*0.2).toFixed(2),
    los_x_diagnoses:       form.time_in_hospital * form.number_diagnoses,
    meds_x_los:            form.num_medications * form.time_in_hospital,
    elderly_x_complex:     (form.age_numeric>=65?1:0) * (form.number_diagnoses + form.num_medications*0.5),
    inpatient_x_emergency: form.number_inpatient * form.number_emergency,
    high_diagnosis_burden: form.number_diagnoses >= 5 ? 1 : 0,
    high_lab_use:          form.num_lab_procedures > 40 ? 1 : 0,
    had_procedures:        form.num_procedures > 0 ? 1 : 0,
    has_inpatient_history: form.number_inpatient >= 1 ? 1 : 0,
    emergency_prone:       form.number_emergency >= 2 ? 1 : 0,
    high_utiliser:         (form.number_inpatient + form.number_emergency) >= 3 ? 1 : 0,
  });

  const predict = async () => {
    setLoading(true); setError("");
    try {
      const r = await fetch(`${API}/predict/`, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ patient_data: buildPayload() }),
      });
      const data = await r.json();
      setResult(data);
      setHistory(h => [{ id:h.length+1, time:new Date().toLocaleTimeString(), age:form.age_numeric, los:form.time_in_hospital, risk:data.risk_level, prob:data.readmission_percentage }, ...h.slice(0,9)]);
      setTab("result");
    } catch(e) {
      setError("Cannot reach API. Make sure Django server is running on port 8000.");
    }
    setLoading(false);
  };

  const rc = result ? RISK_CONFIG[result.risk_level] : null;

  return (
    <div style={{minHeight:"100vh"}}>
      {/* Header */}
      <div style={{background:"rgba(255,255,255,0.05)",backdropFilter:"blur(10px)",borderBottom:"1px solid rgba(255,255,255,0.1)",padding:"16px 32px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{fontSize:32}}>🏥</div>
          <div>
            <div style={{fontSize:22,fontWeight:800,background:"linear-gradient(90deg,#a78bfa,#38bdf8)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>ReVive</div>
            <div style={{fontSize:11,color:"#94a3b8"}}>Hospital Readmission Prediction</div>
          </div>
        </div>
        <div style={{display:"flex",gap:8}}>
          {[["predict","🔍 Predict"],["history","📋 History"]].map(([t,l]) => (
            <button key={t} onClick={()=>setTab(t)} style={{padding:"8px 20px",borderRadius:20,border:"none",cursor:"pointer",fontWeight:600,fontSize:13,background:tab===t||tab==="result"&&t==="predict"?"linear-gradient(135deg,#7c3aed,#2563eb)":"rgba(255,255,255,0.1)",color:"#fff"}}>
              {l}
            </button>
          ))}
        </div>
      </div>

      <div style={{padding:"24px 32px",maxWidth:1200,margin:"0 auto"}}>
        {error && <div style={{background:"#FCEBEB",color:"#A32D2D",padding:"12px 20px",borderRadius:12,marginBottom:20,fontWeight:600}}>⚠️ {error}</div>}

        {/* PREDICT / RESULT */}
        {(tab==="predict"||tab==="result") && (
          <div style={{display:"grid",gridTemplateColumns:
